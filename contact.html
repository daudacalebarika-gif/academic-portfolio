<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Academic Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">EduPortfolio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html">Planner</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="contact-wrapper">
            <h2>Get In Touch</h2>
            <p>Fill out the form below to reach out regarding collaborations or feedback.</p>
            <hr>

            <form id="contactForm" class="contact-form" novalidate>
                <div id="errorMessage" class="error-banner hidden"></div>
                
                <div class="form-control">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Your Name">
                </div>

                <div class="form-control">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>

                <div class="form-control">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Digits only (e.g., 08012345678)">
                </div>

                <div class="form-control">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" class="btn primary-btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Caleb Arika. All Rights Reserved </p>
    </footer>

    <script src="contact.js"></script>
</body>
</html>
